apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: kc
  namespace: ${NAMESPACE}
spec:
  instances: 1
  db:
    vendor: postgres
    host: postgres-db
    database: keycloak
    usernameSecret:
      name: postgres-secret
      key: POSTGRES_USER
    passwordSecret:
      name: postgres-secret
      key: POSTGRES_PASSWORD
  hostname:
    hostname: kc-${NAMESPACE}.${CLUSTER_APPS_DOMAIN}
  http:
    httpEnabled: true
  ingress:
    enabled: false
  additionalOptions:
    - name: proxy-headers
      value: xforwarded
    - name: hostname-strict-https
      value: "false"
